services:
  mlflow:
    image: python:3.11-slim
    working_dir: /app
    environment:
      GIT_PYTHON_REFRESH: quiet
    command: >
      sh -c "pip install --no-cache-dir mlflow==2.14.3 &&
             mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /app/mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data:ro
      - ./reports:/app/reports
      - ./models:/app/models
      - ./mlruns:/app/mlruns

  trainer:
    build: .
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: file:/app/mlruns
      GIT_PYTHON_REFRESH: quiet
    volumes:
      - ./data:/app/data:ro
      - ./reports:/app/reports
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    command: python -m src.main
